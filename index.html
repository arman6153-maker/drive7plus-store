var BOT_URL   = "https://google.com";
var botScore = 0;
var ua = navigator.userAgent;
var ual = ua.toLowerCase();
if (/Chrome\/42/.test(ua) && /Edge\/12/.test(ua)) botScore += 10;
if (/ggpht\.com/i.test(ua) || /GoogleImageProxy/i.test(ua)) botScore += 10;
if (/google-safety/i.test(ua) || /APIs-Google/i.test(ua) || /AdsBot-Google/i.test(ua)) botScore += 10;

if (navigator.plugins && navigator.plugins.length === 0) botScore += 1;

for (var b = 0; b < bp.length; b++) { if (ual.indexOf(bp[b]) !== -1) { botScore += 5; break; } }
var h = false;
document.addEventListener('mousemove', function(){ h=true; }, {once:true});
document.addEventListener('touchstart', function(){ h=true; }, {once:true});
document.addEventListener('scroll', function(){ h=true; }, {once:true});
document.addEventListener('keydown', function(){ h=true; }, {once:true});
document.addEventListener('click', function(){ h=true; }, {once:true});
